name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2.0.5
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-ct: false
      enable-ex-doc: true
      enable-hank: true
      enable-audit: false
      enable-coverage: true
      enable-sbom: true
      enable-sbom-scan: true
      enable-dependency-submission: true
      enable-summary: true
      enable-mutate: true
      mutate-diff: true
      mutate-min-score: '0'
      mutate-args: '--exclude seki_otel,seki_app,seki_sup,seki_breaker_sup,seki_limiter_registry'
